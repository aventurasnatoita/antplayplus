<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natal - AnTPlay+</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4e67b1;
            --secondary: #ba852a;
            --dark: #141414;
            --light: #ffffff;
            --gray: #b3b3b3;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        
        body {
            background-color: var(--dark);
            color: var(--light);
        }
        
        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
        }
        
        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--light);
            text-decoration: none;
        }
        
        .logo span {
            color: var(--primary);
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav li {
            margin-left: 20px;
        }
        
        nav a {
            color: var(--light);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
            transition: 0.3s;
        }
        
        nav a:hover {
            color: var(--gray);
        }
        
        .user-actions {
            display: flex;
            align-items: center;
        }
        
        .user-actions button {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.1rem;
            margin-left: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .user-actions button:hover {
            color: var(--gray);
        }
        
        /* Hero Section */
        .hero {
            height: 50vh;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            display: flex;
            align-items: flex-end;
            padding: 0 50px 30px;
            position: relative;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        
        .hero-content {
            max-width: 800px;
        }
        
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        
        /* Movies Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 50px;
        }
        
        .movie-card {
            position: relative;
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .movie-card:hover {
            transform: scale(1.05);
        }
        
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        
        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 15px;
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
        }
        
        .movie-card:hover .movie-info {
            opacity: 1;
            transform: translateY(0);
        }
        
        .movie-title {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .movie-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--gray);
        }
        
        .age-rating {
            background: var(--secondary);
            color: var(--dark);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 800;
        }
        
        /* Footer */
        footer {
            padding: 20px 50px;
            background: var(--dark);
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            border-top: 1px solid #333;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }
            
            .hero {
                padding: 0 20px 30px;
                height: 40vh;
            }
            
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .movies-grid {
                padding: 30px 20px;
                gap: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .hero h1 {
                font-size: 2rem;
            }
            
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <a href="inicio.html" class="logo">AnT<span>Play</span>+</a>
        <nav>
            <ul>
                <li><a href="inicio.html">Início</a></li>
                <li><a href="filmes.html">Filmes</a></li>
                <li><a href="cartaz.html">Natal</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <img src="https://assets.codepen.io/3364143/Netflix_14.jpg" alt="Filmes de Natal" class="hero-bg">
        <div class="hero-content">
            <h1>Filmes de Natal</h1>
        </div>
    </section>

    <!-- Movies Grid -->
    <div class="movies-grid">
        <div class="movie-card">
            <img src="https://assets.codepen.io/3364143/Netflix_8.jpg" alt="Filme de Natal">
            <div class="movie-info">
                <div class="movie-title">Insónia Até ao Natal</div>
                <div class="movie-meta">
                    <span>2018</span>
                    <span class="age-rating">12+</span>
                </div>
            </div>
        </div>
        <div class="movie-card">
            <img src="https://assets.codepen.io/3364143/Netflix_8.jpg" alt="Filme de Natal">
            <div class="movie-info">
                <div class="movie-title">Anna e o Apocalipse</div>
                <div class="movie-meta">
                    <span>2018</span>
                    <span class="age-rating">12+</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        2025 AnTPlay+
    </footer>
</body>
</html>
